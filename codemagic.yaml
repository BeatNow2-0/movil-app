workflows:
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      xcode: 15.4 # Usa 15.4 en lugar de 16.4
      flutter: 3.24.5 # Versión específica compatible
      cocoapods: default
      groups:
        # Agrega tus grupos de variables de entorno aquí si los tienes
        # - firebase_credentials
      vars:
        BUNDLE_ID: "com.example.flutterTest1"  # Cambia esto por tu Bundle ID real
    
    scripts:
      - name: Set up Flutter
        script: |
          flutter upgrade
          flutter --version
          
      - name: Clean project
        script: |
          flutter clean
          
      - name: Get Flutter dependencies
        script: |
          flutter pub get
          
      - name: Clean iOS build folder
        script: |
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          rm -rf .symlinks
          rm -rf Flutter/Flutter.framework
          rm -rf Flutter/Flutter.podspec
          
      - name: Update CocoaPods repo
        script: |
          cd ios
          pod repo update
          
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
          
      - name: Flutter doctor
        script: |
          flutter doctor -v
          
      - name: Build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign
          
    artifacts:
      - build/ios/iphoneos/**/*.app
      - build/ios/iphoneos/**/*.dSYM
      
    publishing:
      email:
        recipients:
          - tu-email@example.com  # Cambia esto por tu email
        notify:
          success: true
          failure: true